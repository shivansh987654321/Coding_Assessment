spring.application.name=coding-assessment-platform
server.port=${PORT:8080}
# Render terminates TLS at its proxy; honour X-Forwarded-* so links / cookies use https
server.forward-headers-strategy=framework

# ---------- Database ----------
# In production set DB_URL to the full Aiven JDBC URL, e.g.
#   jdbc:mysql://<host>:<port>/<dbname>?sslMode=REQUIRED&serverTimezone=UTC
# Falls back to a local MySQL for dev.
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:code_assessment}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - tuned for Aiven free tier (~16 max connections)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1500000

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------- CORS ----------
# Comma-separated list, e.g. https://your-app.vercel.app,http://localhost:5173
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---------- Judge0 ----------
judge0.base-url=${JUDGE0_BASE_URL:https://ce.judge0.com}
judge0.api-key=${JUDGE0_API_KEY:}
judge0.api-host=${JUDGE0_API_HOST:}

# ---------- Actuator (Render health check) ----------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
