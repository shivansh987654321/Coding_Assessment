spring.application.name=coding-assessment-platform
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:code_assessment}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
judge0.base-url=${JUDGE0_BASE_URL:https://ce.judge0.com}
judge0.api-key=${JUDGE0_API_KEY:}
judge0.api-host=${JUDGE0_API_HOST:}
